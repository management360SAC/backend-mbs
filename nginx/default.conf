server {
    listen 80;
    server_name crm.mbs.pe;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name crm.mbs.pe;

    ssl_certificate     /etc/letsencrypt/live/crm.mbs.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.mbs.pe/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Meta Webhook — debe responder sin prefijo /api
    location /facebook/webhook {
        proxy_pass         http://crm-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Formulario web externo — sin prefijo /api
    location /web-form/lead {
        proxy_pass         http://crm-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # API Backend NestJS
    location /api/ {
        proxy_pass         http://crm-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Frontend React (SPA — todas las rutas sirven index.html)
    location / {
        proxy_pass              http://crm-web:5173;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_intercept_errors  on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass         http://crm-web:5173;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        rewrite            ^ / break;
    }
}
